services:

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vividp_postgres
    environment:
      POSTGRES_DB: vividp
      POSTGRES_USER: vividp
      POSTGRES_PASSWORD: vividp_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Auto-runs migrations alphabetically on first start:
      #   001_settings.sql  → tenants, systems, station_configs, document_types, ...
      #   002_jobs.sql      → jobs, job_documents, job_pages, job_fields, ...
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U vividp" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── NATS JetStream ────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    container_name: vividp_nats
    # -js = enable JetStream, -sd = storage directory
    command: "-js -sd /data -m 8222"
    ports:
      - "4222:4222" # client connections
      - "8222:8222" # HTTP monitoring UI  → http://localhost:8222
    volumes:
      - nats_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:8222/healthz || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MinIO (S3-compatible object store) ────────────────────
  minio:
    image: minio/minio:latest
    container_name: vividp_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: vividp
      MINIO_ROOT_PASSWORD: vividp_dev
      # ── NATS bucket notifications ────────────────────────
      # MinIO publishes ObjectCreated events to NATS natively.
      # The injection service subscribes to these subjects.
      MINIO_NOTIFY_NATS_ENABLE_PRIMARY: "on"
      MINIO_NOTIFY_NATS_ADDRESS_PRIMARY: "nats:4222"
      MINIO_NOTIFY_NATS_SUBJECT_PRIMARY: "vividp.minio.events"
      MINIO_NOTIFY_NATS_JETSTREAM_PRIMARY: "on"
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console → http://localhost:9001
    volumes:
      - minio_data:/data
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MinIO bucket + notification setup (runs once, then exits)
  minio_setup:
    image: minio/mc:latest
    container_name: vividp_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 vividp vividp_dev &&

        mc mb --ignore-existing local/input &&
        mc mb --ignore-existing local/jobs &&
        mc mb --ignore-existing local/templates &&
        mc mb --ignore-existing local/archive &&

        mc event add local/input arn:minio:sqs::PRIMARY:nats \
          --event put \
          --suffix '.pdf,.tif,.tiff,.png,.jpg,.jpeg' &&

        echo 'Buckets: input, jobs, templates, archive' &&
        echo 'Notifications: input → NATS (ObjectCreated)' &&
        exit 0
      "

  # ── Conversion Service ────────────────────────────────────────
  conversion:
    build:
      context: .
      dockerfile: Dockerfile.conversion
    container_name: vividp_conversion
    environment:
      STORAGE_ENDPOINT: minio:9000
      STORAGE_ACCESS_KEY: vividp
      STORAGE_SECRET_KEY: vividp_dev
      STORAGE_SECURE: "false"
      JOBS_BUCKET: jobs
      LISTEN_ADDR: ":8082"
      LOG_LEVEL: info
    ports:
      - "8082:8082"   # host:container — integration tests reach it at localhost:8082
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped

  # ── Ingestion Service ────────────────────────────────────────
  ingestion:
    build:
      context: .
      dockerfile: Dockerfile.ingestion
    container_name: vividp_ingestion
    environment:
      DATABASE_URL: postgres://vividp:vividp_dev@postgres:5432/vividp
      NATS_URL: nats://nats:4222
      STORAGE_ENDPOINT: minio:9000
      STORAGE_ACCESS_KEY: vividp
      STORAGE_SECRET_KEY: vividp_dev
      STORAGE_SECURE: "false"
      INPUT_BUCKET: input
      JOBS_BUCKET: jobs
      CONVERSION_URL: http://conversion:8082
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
      conversion:
        condition: service_started
    restart: unless-stopped

  # ── Recognition Service ───────────────────────────────────────
  recognition:
    build:
      context: .
      dockerfile: Dockerfile.recognition
    container_name: vividp_recognition
    environment:
      DATABASE_URL: postgres://vividp:vividp_dev@postgres:5432/vividp
      NATS_URL: nats://nats:4222
      STORAGE_ENDPOINT: minio:9000
      STORAGE_ACCESS_KEY: vividp
      STORAGE_SECRET_KEY: vividp_dev
      STORAGE_SECURE: "false"
      JOBS_BUCKET: jobs
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # ── Export Service ────────────────────────────────────────────
  export:
    build:
      context: .
      dockerfile: Dockerfile.export
    container_name: vividp_export
    environment:
      DATABASE_URL: postgres://vividp:vividp_dev@postgres:5432/vividp
      NATS_URL: nats://nats:4222
      STORAGE_ENDPOINT: minio:9000
      STORAGE_ACCESS_KEY: vividp
      STORAGE_SECRET_KEY: vividp_dev
      STORAGE_SECURE: "false"
      JOBS_BUCKET: jobs
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # ── Job Admin API ─────────────────────────────────────────────
  job-admin-api:
    build:
      context: .
      dockerfile: Dockerfile.job-admin-api
    container_name: vividp_job_admin_api
    environment:
      DATABASE_URL: postgres://vividp:vividp_dev@postgres:5432/vividp
      NATS_URL: nats://nats:4222
      STORAGE_ENDPOINT: minio:9000
      STORAGE_ACCESS_KEY: vividp
      STORAGE_SECRET_KEY: vividp_dev
      STORAGE_SECURE: "false"
      JOBS_BUCKET: jobs
      ADMIN_API_ADDR: ":8081"
      LOG_LEVEL: info
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  # ── Lambda Dispatcher ─────────────────────────────────────────
  lambda-dispatcher:
    build:
      context: .
      dockerfile: Dockerfile.lambda-dispatcher
    container_name: vividp_lambda_dispatcher
    environment:
      NATS_URL: nats://nats:4222
      LOG_LEVEL: info
      # LAMBDA_DISPATCH: "INGESTED:https://<id>.lambda-url.eu-west-1.on.aws/classify,RECOGNIZED:https://<id>.lambda-url.eu-west-1.on.aws/ivo"
      LAMBDA_DISPATCH: ""
      LAMBDA_HTTP_TIMEOUT: 30s
    depends_on:
      nats:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  nats_data:
  minio_data:
