name: Build, Push & Deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push ingestion
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ingestion
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/ingestion:${{ github.sha }}
            ghcr.io/${{ github.repository }}/ingestion:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push conversion
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.conversion
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/conversion:${{ github.sha }}
            ghcr.io/${{ github.repository }}/conversion:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push job-admin-api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.job-admin-api
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/job-admin-api:${{ github.sha }}
            ghcr.io/${{ github.repository }}/job-admin-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push recognition
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.recognition
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/recognition:${{ github.sha }}
            ghcr.io/${{ github.repository }}/recognition:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push export
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.export
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/export:${{ github.sha }}
            ghcr.io/${{ github.repository }}/export:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push nginx (UI + proxy)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.nginx
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/nginx:${{ github.sha }}
            ghcr.io/${{ github.repository }}/nginx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Hetzner
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (for compose file)
        uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/opt/vividp"

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/vividp

            # Pull all new images
            export GITHUB_REPOSITORY=${{ github.repository }}
            export IMAGE_TAG=${{ github.sha }}
            docker compose -f docker-compose.prod.yml pull

            # Restart with zero-downtime (compose handles it)
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Clean up old images
            docker image prune -f

            echo "Deploy complete — image: $IMAGE_TAG"
