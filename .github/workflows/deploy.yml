name: Build, Push & Deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}
  DEPLOY_PATH: /opt/vividp-next-gen

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Log in to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build & push ingestion
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile.ingestion
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/ingestion:${{ github.sha }}
            ghcr.io/${{ github.repository }}/ingestion:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push conversion
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile.conversion
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/conversion:${{ github.sha }}
            ghcr.io/${{ github.repository }}/conversion:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push job-admin-api
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile.job-admin-api
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/job-admin-api:${{ github.sha }}
            ghcr.io/${{ github.repository }}/job-admin-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push recognition
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile.recognition
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/recognition:${{ github.sha }}
            ghcr.io/${{ github.repository }}/recognition:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push export
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile.export
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/export:${{ github.sha }}
            ghcr.io/${{ github.repository }}/export:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push nginx (UI + proxy)
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile.nginx
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/nginx:${{ github.sha }}
            ghcr.io/${{ github.repository }}/nginx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to server
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout (for compose file)
        uses: actions/checkout@v6.0.2

      - name: Ensure deploy directory exists
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p "${{ env.DEPLOY_PATH }}"

      - name: Install systemd service for auto-start
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cat > /etc/systemd/system/vividp.service << 'EOF'
            [Unit]
            Description=VividP Production Stack
            Requires=docker.service
            After=docker.service network-online.target

            [Service]
            Type=oneshot
            RemainAfterExit=yes
            WorkingDirectory=/opt/vividp-next-gen
            ExecStart=/usr/bin/docker compose -f docker-compose.prod.yml up -d --remove-orphans
            ExecStop=/usr/bin/docker compose -f docker-compose.prod.yml down
            TimeoutStartSec=300
            TimeoutStopSec=60

            [Install]
            WantedBy=multi-user.target
            EOF
            systemctl daemon-reload
            systemctl enable vividp

      - name: Copy docker-compose.prod.yml to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "${{ env.DEPLOY_PATH }}"

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd "${{ env.DEPLOY_PATH }}"

            export IMAGE_TAG=${{ github.sha }}
            echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose -f docker-compose.prod.yml pull

            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            docker image prune -f

            echo "Deploy complete — image: $IMAGE_TAG"
