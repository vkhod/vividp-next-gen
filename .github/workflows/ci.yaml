name: CI

on:
  pull_request:
    branches: [master]

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Build (Go)
        run: go build ./...

      - name: Test (Go)
        run: go test ./...

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: admin-ui/package-lock.json

      - name: Install (admin-ui)
        working-directory: admin-ui
        run: npm ci

      - name: Build (admin-ui)
        working-directory: admin-ui
        run: npm run build