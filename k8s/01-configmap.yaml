apiVersion: v1
kind: ConfigMap
metadata:
  name: vividp-config
  namespace: vividp
data:
  # Service discovery — use Kubernetes Service names, not localhost
  NATS_URL: "nats://nats:4222"
  STORAGE_ENDPOINT: "minio:9000"
  STORAGE_SECURE: "false"

  # Bucket names
  INPUT_BUCKET: "input"
  JOBS_BUCKET: "jobs"

  # Ingestion service
  WEBHOOK_PORT: "8080"
  VIVIDP_DEFAULT_SYSTEM_ID: "00000000-0000-0000-0000-000000000002"
  VIVIDP_DEFAULT_TENANT_ID: "00000000-0000-0000-0000-000000000001"

  # Job Admin API
  ADMIN_API_ADDR: ":8081"

  # Shared
  LOG_LEVEL: "info"
