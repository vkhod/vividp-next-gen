apiVersion: v1
kind: Secret
metadata:
  name: vividp-secrets
  namespace: vividp
type: Opaque
# stringData accepts plain text — Kubernetes base64-encodes it automatically.
# In production, use a secrets manager (Vault, AWS Secrets Manager, SOPS).
stringData:
  DATABASE_URL: "postgres://vividp:vividp_dev@postgres:5432/vividp"
  STORAGE_ACCESS_KEY: "vividp"
  STORAGE_SECRET_KEY: "vividp_dev"
  POSTGRES_PASSWORD: "vividp_dev"
  MINIO_ROOT_USER: "vividp"
  MINIO_ROOT_PASSWORD: "vividp_dev"
