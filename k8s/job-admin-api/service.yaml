apiVersion: v1
kind: Service
metadata:
  name: job-admin-api
  namespace: vividp
spec:
  # NodePort: accessible from outside the cluster.
  # kind-config.yaml maps host port 30081 → this NodePort.
  type: NodePort
  selector:
    app: job-admin-api
  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30081
