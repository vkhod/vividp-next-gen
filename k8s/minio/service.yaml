apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: vividp
spec:
  type: NodePort
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
      # No nodePort — MinIO API is only needed inside the cluster
    - name: console
      port: 9001
      targetPort: 9001
      nodePort: 30900    # MinIO web console → http://localhost:30900
