apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: vividp
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: vividp-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vividp-secrets
                  key: MINIO_ROOT_PASSWORD
            # NATS bucket-notification config (same as docker-compose)
            - name: MINIO_NOTIFY_NATS_ENABLE_PRIMARY
              value: "on"
            - name: MINIO_NOTIFY_NATS_ADDRESS_PRIMARY
              value: "nats:4222"
            - name: MINIO_NOTIFY_NATS_SUBJECT_PRIMARY
              value: "vividp.minio.events"
            - name: MINIO_NOTIFY_NATS_JETSTREAM_PRIMARY
              value: "on"
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 20
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
