kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      # Admin UI → http://localhost:30080
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      # Job Admin API → http://localhost:30081
      - containerPort: 30081
        hostPort: 30081
        protocol: TCP
      # MinIO console → http://localhost:30900
      - containerPort: 30900
        hostPort: 30900
        protocol: TCP
